services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: rpi-portainer
    restart: unless-stopped
    ports:
      - "${PORTAINER_PORT}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${RPI_RUNTIME_ROOT}/portainer/data:/data

  dozzle:
    image: amir20/dozzle:latest
    container_name: rpi-dozzle
    restart: unless-stopped
    ports:
      - "${DOZZLE_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: rpi-filebrowser
    restart: unless-stopped
    ports:
      - "${FILEBROWSER_PORT}:80"
    volumes:
      - /srv/rs-data-platform:/srv
      - ${RPI_RUNTIME_ROOT}/filebrowser/config:/config

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: rpi-uptime-kuma
    restart: unless-stopped
    ports:
      - "${UPTIME_KUMA_PORT}:3001"
    volumes:
      - ${RPI_RUNTIME_ROOT}/uptime-kuma/data:/app/data
