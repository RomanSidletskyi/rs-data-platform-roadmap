name: Reference Docker validate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Build image for validation
        run: docker build -f docker/Dockerfile -t reference-docker-ci:pr .