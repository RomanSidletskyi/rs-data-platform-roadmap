name: Reference reusable validate

on:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Write validation report
        run: |
          mkdir -p dist
          python -c "from src.workflow_checks import validation_report; from pathlib import Path; Path('dist/validation-report.txt').write_text(validation_report('.'))"

      - uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: dist/validation-report.txt