tables:
  bronze: bronze.orders_raw
  silver: silver.orders_clean
  gold: gold.daily_sales
repair:
  strategy: replace_where
  business_date_column: business_date
  allowed_window_days: 3
validation:
  required_fields:
    - order_id
    - business_date
    - customer_id
    - country_code
    - gross_amount
    - order_status
  allowed_statuses:
    - paid
    - refunded
    - pending
