name: Docker validate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Validate Docker image build
        run: docker build -f docker/Dockerfile -t docker-image-ci-cd:pr .