name: Foundational starter assets

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/foundational-starter-assets.yml'
      - '00-shell-linux/**'
      - '00-git/**'
      - 'scripts/sections/modules/00-shell-linux/**'
      - 'scripts/sections/modules/00-git/**'
      - 'scripts/bootstrap_section.sh'
      - 'scripts/README.md'
  push:
    branches: [main]
    paths:
      - '.github/workflows/foundational-starter-assets.yml'
      - '00-shell-linux/**'
      - '00-git/**'
      - 'scripts/sections/modules/00-shell-linux/**'
      - 'scripts/sections/modules/00-git/**'
      - 'scripts/bootstrap_section.sh'
      - 'scripts/README.md'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git identity for practice repos
        run: |
          git config --global user.name "Starter Assets CI"
          git config --global user.email "starter-assets-ci@example.com"

      - name: Validate foundational starter assets
        run: |
          chmod +x scripts/check_repo.sh
          ./scripts/check_repo.sh foundational